name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout checks library
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: redhat-best-practices-for-k8s/checks
          path: checks-lib


      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Configure replace directive for CI
        run: |
          go mod edit -replace github.com/redhat-best-practices-for-k8s/checks=${{ github.workspace }}/checks-lib

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          args: --timeout 5m

      - name: go vet
        run: make vet

      - name: Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout checks library
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: redhat-best-practices-for-k8s/checks
          path: checks-lib


      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Configure replace directive for CI
        run: |
          go mod edit -replace github.com/redhat-best-practices-for-k8s/checks=${{ github.workspace }}/checks-lib

      - name: Run tests
        run: make test

      - name: Check coverage threshold
        run: |
          THRESHOLD=15
          COVERAGE=$(go tool cover -func=cover.out \
            | grep -v 'zz_generated' \
            | grep '^total:' \
            | awk '{print $3}' \
            | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

  build:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout checks library
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: redhat-best-practices-for-k8s/checks
          path: checks-lib


      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Configure replace directive for CI
        run: |
          go mod edit -replace github.com/redhat-best-practices-for-k8s/checks=${{ github.workspace }}/checks-lib

      - name: Build binary
        run: make build

      - name: Build container image
        run: |
          cp -r checks-lib .checks-vendor
          docker build -t bps-operator:ci .
          rm -rf .checks-vendor
